name: Deploy to Cloudflare

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  # NOTE: deploy-dashboard removed — the hub (aaron-projects-hub Pages project)
  # now deploys from its own repo Aaron-1411/cc-hub. See dashboard/README.md.
  # NOTE: deploy-get-settld removed — get-settld-app now deploys from its own
  # repo Aaron-1411/get-settld (.github/workflows/deploy.yml, CLOUDFLARE_API_TOKEN
  # set there). The monorepo no longer double-deploys it.

  deploy-wealth-companion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd wealth-companion && bun install && bun run build && rm -rf .wrangler
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          workingDirectory: wealth-companion/dist/server
          command: deploy

  deploy-lease-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd lease-guard && bun install && bun run build && rm -rf .wrangler
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          workingDirectory: lease-guard/dist/server
          command: deploy

  deploy-open-eyes-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd open-eyes-data && bun install && bun run build && rm -rf .wrangler
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          workingDirectory: open-eyes-data/dist/server
          command: deploy

  deploy-lifedash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          command: pages deploy lifedash --project-name=lifedash-app --branch=main

  deploy-gymseek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          workingDirectory: gymseek
          command: pages deploy . --project-name=gymseek-app --branch=main

  deploy-tastybot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd tastybot && bun install && bun run build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          command: pages deploy tastybot/dist --project-name=tastybot-app --branch=main

  # isa-investment-platform is a local-only Prisma/SQLite dev tool — API routes
  # cannot be statically exported to CF Pages, so it was never deployed here. It
  # now lives solely in its own repo Aaron-1411/isa-investment-platform.

  deploy-digital-depth-dive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Ensure CF Pages project exists
        run: |
          curl -s -o /dev/null \
            -X POST "https://api.cloudflare.com/client/v4/accounts/a1a1276a1a278339d95c187e0bf6de47/pages/projects" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"digital-depth-dive-app","production_branch":"main"}' || true
      - run: cd digital-depth-dive && bun install && bun run build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          command: pages deploy digital-depth-dive/dist --project-name=digital-depth-dive-app --branch=main

  deploy-inkspector:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Ensure CF Pages project exists
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.cloudflare.com/client/v4/accounts/a1a1276a1a278339d95c187e0bf6de47/pages/projects" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"inkspector-app","production_branch":"main"}' || true
      - name: Set CF Pages environment variables
        run: |
          curl -s -X PATCH "https://api.cloudflare.com/client/v4/accounts/a1a1276a1a278339d95c187e0bf6de47/pages/projects/inkspector-app" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "deployment_configs": {
                "production": {
                  "compatibility_flags": ["nodejs_compat"],
                  "compatibility_date": "2024-09-23",
                  "env_vars": {
                    "NEXT_PUBLIC_SUPABASE_URL": {"value": "${{ secrets.INKSPECTOR_SUPABASE_URL }}", "type": "plain_text"},
                    "NEXT_PUBLIC_SUPABASE_ANON_KEY": {"value": "${{ secrets.INKSPECTOR_SUPABASE_ANON_KEY }}", "type": "plain_text"},
                    "SUPABASE_SERVICE_ROLE_KEY": {"value": "${{ secrets.INKSPECTOR_SUPABASE_SERVICE_ROLE_KEY }}", "type": "secret_text"},
                    "RESEND_API_KEY": {"value": "${{ secrets.RESEND_API_KEY }}", "type": "secret_text"}
                  }
                },
                "preview": {
                  "compatibility_flags": ["nodejs_compat"],
                  "compatibility_date": "2024-09-23",
                  "env_vars": {
                    "NEXT_PUBLIC_SUPABASE_URL": {"value": "${{ secrets.INKSPECTOR_SUPABASE_URL }}", "type": "plain_text"},
                    "NEXT_PUBLIC_SUPABASE_ANON_KEY": {"value": "${{ secrets.INKSPECTOR_SUPABASE_ANON_KEY }}", "type": "plain_text"},
                    "SUPABASE_SERVICE_ROLE_KEY": {"value": "${{ secrets.INKSPECTOR_SUPABASE_SERVICE_ROLE_KEY }}", "type": "secret_text"},
                    "RESEND_API_KEY": {"value": "${{ secrets.RESEND_API_KEY }}", "type": "secret_text"}
                  }
                }
              }
            }'
      - run: cd inkspector && bun install && bunx @cloudflare/next-on-pages
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.INKSPECTOR_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.INKSPECTOR_SUPABASE_ANON_KEY }}
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          wranglerVersion: '4.94.0'
          workingDirectory: inkspector
          command: pages deploy .vercel/output/static --project-name=inkspector-app --branch=main

  deploy-pension-finder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Ensure CF Pages project exists
        run: |
          curl -s -o /dev/null \
            -X POST "https://api.cloudflare.com/client/v4/accounts/a1a1276a1a278339d95c187e0bf6de47/pages/projects" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"pension-finder-app","production_branch":"main"}' || true
      - run: cd pension-finder-uk && bun install && bun run build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          command: pages deploy pension-finder-uk/out --project-name=pension-finder-app --branch=main

  deploy-brand-command-centre:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Brand Command Centre is a full SSR Next.js app backed by Workers KV. Its
      # next-on-pages edge bundle is 5.2 MiB gzipped, over the free Workers 3 MiB
      # cap, and the deploy token lacks Workers KV Storage permission. Rather than
      # ship a broken Worker, CF hosts a self-contained static "Visual demo" page
      # (brand-command-centre-demo/) that previews the UI; the fully interactive
      # app runs locally. URL is preserved (ecommerce-deep-dive-app.pages.dev).
      - name: Ensure CF Pages project exists
        run: |
          curl -s -o /dev/null \
            -X POST "https://api.cloudflare.com/client/v4/accounts/a1a1276a1a278339d95c187e0bf6de47/pages/projects" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"ecommerce-deep-dive-app","production_branch":"main"}' || true
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          command: pages deploy brand-command-centre-demo --project-name=ecommerce-deep-dive-app --branch=main

  deploy-quant-desk-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Quant Desk (Tr4d3) is a self-contained FastAPI app that computes every
      # number in Python from live market data — it can't run on CF Pages (Python
      # backend + live providers). CF hosts a self-contained static "Visual demo"
      # (quant-desk-demo/) with real numbers frozen from the live desk (AAPL
      # snapshot). The fully interactive desk runs self-hosted; see GitHub repo.
      - name: Ensure CF Pages project exists
        run: |
          curl -s -o /dev/null \
            -X POST "https://api.cloudflare.com/client/v4/accounts/a1a1276a1a278339d95c187e0bf6de47/pages/projects" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"quant-desk-demo","production_branch":"main"}' || true
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          command: pages deploy quant-desk-demo --project-name=quant-desk-demo --branch=main

  deploy-moneymind-uk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Ensure CF Pages project exists
        run: |
          curl -s -o /dev/null \
            -X POST "https://api.cloudflare.com/client/v4/accounts/a1a1276a1a278339d95c187e0bf6de47/pages/projects" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"moneymind-uk-app","production_branch":"main"}' || true
      - name: Set CF Pages environment variables
        run: |
          curl -s -X PATCH "https://api.cloudflare.com/client/v4/accounts/a1a1276a1a278339d95c187e0bf6de47/pages/projects/moneymind-uk-app" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "deployment_configs": {
                "production": {
                  "compatibility_flags": ["nodejs_compat"],
                  "compatibility_date": "2024-11-27",
                  "env_vars": {
                    "ANTHROPIC_API_KEY": {"value": "${{ secrets.ANTHROPIC_API_KEY }}", "type": "secret_text"}
                  }
                },
                "preview": {
                  "compatibility_flags": ["nodejs_compat"],
                  "compatibility_date": "2024-11-27",
                  "env_vars": {
                    "ANTHROPIC_API_KEY": {"value": "${{ secrets.ANTHROPIC_API_KEY }}", "type": "secret_text"}
                  }
                }
              }
            }'
      - run: cd moneymind-uk && bun install && bun run build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          workingDirectory: moneymind-uk
          command: pages deploy dist --project-name=moneymind-uk-app --branch=main

  deploy-whole-health-compass:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Ensure CF Pages project exists
        run: |
          curl -s -o /dev/null \
            -X POST "https://api.cloudflare.com/client/v4/accounts/a1a1276a1a278339d95c187e0bf6de47/pages/projects" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"whole-health-compass-app","production_branch":"main"}' || true
      # Backend secrets. The app degrades gracefully when these are unset (empty ->
      # persistence/email/admin stay dormant), so CI is green from the first push.
      # Activate by adding the GitHub secrets below, then re-run (see whole-health-compass/ACTIVATION.md).
      - name: Set CF Pages environment variables
        run: |
          curl -s -X PATCH "https://api.cloudflare.com/client/v4/accounts/a1a1276a1a278339d95c187e0bf6de47/pages/projects/whole-health-compass-app" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "deployment_configs": {
                "production": {
                  "compatibility_flags": ["nodejs_compat"],
                  "compatibility_date": "2024-11-27",
                  "env_vars": {
                    "RESEND_API_KEY": {"value": "${{ secrets.RESEND_API_KEY }}", "type": "secret_text"},
                    "LEAD_FROM": {"value": "${{ secrets.WHC_LEAD_FROM }}", "type": "plain_text"},
                    "LEAD_NOTIFY_TO": {"value": "${{ secrets.WHC_LEAD_NOTIFY_TO }}", "type": "plain_text"},
                    "ADMIN_TOKEN": {"value": "${{ secrets.WHC_ADMIN_TOKEN }}", "type": "secret_text"}
                  }
                },
                "preview": {
                  "compatibility_flags": ["nodejs_compat"],
                  "compatibility_date": "2024-11-27",
                  "env_vars": {
                    "RESEND_API_KEY": {"value": "${{ secrets.RESEND_API_KEY }}", "type": "secret_text"},
                    "LEAD_FROM": {"value": "${{ secrets.WHC_LEAD_FROM }}", "type": "plain_text"},
                    "LEAD_NOTIFY_TO": {"value": "${{ secrets.WHC_LEAD_NOTIFY_TO }}", "type": "plain_text"},
                    "ADMIN_TOKEN": {"value": "${{ secrets.WHC_ADMIN_TOKEN }}", "type": "secret_text"}
                  }
                }
              }
            }' || true
      - run: cd whole-health-compass && bun install && bun run build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          workingDirectory: whole-health-compass
          command: pages deploy dist --project-name=whole-health-compass-app --branch=main

  deploy-platespin:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: a1a1276a1a278339d95c187e0bf6de47
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Ensure CF Pages project exists
        run: |
          curl -s -o /dev/null \
            -X POST "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"name":"platespin-app","production_branch":"main"}' || true
      # ── v2 needs durable state. Provision D1 with the same token CI already ──
      # uses for Pages (photos live in D1 as base64 — no R2, so no card / no
      # service to enable). Runs BEFORE build/deploy so any permission gap fails
      # here and the last good v1 deployment stays live (non-destructive).
      - name: Provision D1 and wire binding
        run: |
          set -euo pipefail
          API="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}"
          AUTH="Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"

          # D1: find-or-create the "platespin" database
          D1_LIST=$(curl -s -H "$AUTH" "${API}/d1/database?name=platespin")
          echo "$D1_LIST" | jq -e '.success == true' >/dev/null \
            || { echo "::error::CF API token lacks D1 read scope"; echo "$D1_LIST"; exit 1; }
          DB_ID=$(echo "$D1_LIST" | jq -r '.result[]? | select(.name=="platespin") | .uuid')
          if [ -z "$DB_ID" ]; then
            echo "Creating D1 database platespin…"
            D1_NEW=$(curl -s -X POST -H "$AUTH" -H "Content-Type: application/json" \
              -d '{"name":"platespin"}' "${API}/d1/database")
            echo "$D1_NEW" | jq -e '.success == true' >/dev/null \
              || { echo "::error::Failed to create D1 (token lacks D1:Edit?)"; echo "$D1_NEW"; exit 1; }
            DB_ID=$(echo "$D1_NEW" | jq -r '.result.uuid')
          fi
          echo "D1 database id: ${DB_ID}"

          # Inject the live D1 id into wrangler.toml so pages deploy binds it
          sed -i "s|REPLACE_WITH_PROD_D1_ID|${DB_ID}|" platespin/wrangler.toml
          grep -q "${DB_ID}" platespin/wrangler.toml \
            || { echo "::error::Failed to inject D1 id into wrangler.toml"; exit 1; }
      - run: cd platespin && bun install
      - name: Apply D1 migrations (remote)
        run: cd platespin && bunx wrangler d1 migrations apply platespin --remote
      - run: cd platespin && bun run build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          workingDirectory: platespin
          command: pages deploy dist --project-name=platespin-app --branch=main

  deploy-mtd-filing-companion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Ensure CF Pages project exists
        run: |
          curl -s -o /dev/null \
            -X POST "https://api.cloudflare.com/client/v4/accounts/a1a1276a1a278339d95c187e0bf6de47/pages/projects" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"mtd-filing-companion-app","production_branch":"main"}' || true
      # Server-side secrets for the Pages Functions (HMRC OAuth + Supabase token store).
      # All optional: when a secret is unset the functions degrade gracefully (the
      # HMRC chain reports "not configured"), so CI is green from the first push.
      # Add the GitHub secrets below and re-run to light up the live backend.
      - name: Set CF Pages environment variables
        run: |
          curl -s -X PATCH "https://api.cloudflare.com/client/v4/accounts/a1a1276a1a278339d95c187e0bf6de47/pages/projects/mtd-filing-companion-app" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "deployment_configs": {
                "production": {
                  "compatibility_flags": ["nodejs_compat"],
                  "compatibility_date": "2024-11-27",
                  "env_vars": {
                    "HMRC_CLIENT_ID": {"value": "${{ secrets.MTD_HMRC_CLIENT_ID }}", "type": "secret_text"},
                    "HMRC_CLIENT_SECRET": {"value": "${{ secrets.MTD_HMRC_CLIENT_SECRET }}", "type": "secret_text"},
                    "HMRC_REDIRECT_URI": {"value": "https://mtd-filing-companion-app.pages.dev/api/hmrc/callback", "type": "plain_text"},
                    "TOKEN_ENCRYPTION_KEY": {"value": "${{ secrets.MTD_TOKEN_ENCRYPTION_KEY }}", "type": "secret_text"},
                    "SUPABASE_URL": {"value": "${{ secrets.MTD_SUPABASE_URL }}", "type": "plain_text"},
                    "SUPABASE_SERVICE_ROLE_KEY": {"value": "${{ secrets.MTD_SUPABASE_SERVICE_ROLE_KEY }}", "type": "secret_text"},
                    "SUPABASE_JWT_SECRET": {"value": "${{ secrets.MTD_SUPABASE_JWT_SECRET }}", "type": "secret_text"}
                  }
                },
                "preview": {
                  "compatibility_flags": ["nodejs_compat"],
                  "compatibility_date": "2024-11-27"
                }
              }
            }' || true
      # Self-healing build: with no Supabase creds we ship the honest, banner-labelled
      # UI preview (VITE_PREVIEW=1). The moment MTD_SUPABASE_URL is set, the next
      # deploy automatically switches to the live authenticated app.
      - name: Install and build
        env:
          VITE_SUPABASE_URL: ${{ secrets.MTD_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.MTD_SUPABASE_ANON_KEY }}
        run: |
          cd mtd-filing-companion
          bun install
          if [ -z "$VITE_SUPABASE_URL" ]; then
            echo "No Supabase creds present — building viewable UI preview (VITE_PREVIEW=1)."
            VITE_PREVIEW=1 bun run build
          else
            echo "Supabase creds present — building live authenticated app."
            bun run build
          fi
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          workingDirectory: mtd-filing-companion
          command: pages deploy dist --project-name=mtd-filing-companion-app --branch=main

  deploy-business-interpreter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      # Build-time PUBLIC config. Supabase URL + publishable key ship to the
      # browser by design, so they live as GitHub secrets purely to bake the
      # live client. The build still succeeds if unset (client init is lazy) —
      # the deployed UI just can't reach Supabase until they're present.
      - name: Install and build
        env:
          VITE_SUPABASE_URL: ${{ secrets.BI_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.BI_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.BI_SUPABASE_PROJECT_ID }}
        run: cd business-interpreter && bun install && bun run build && rm -rf .wrangler
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          workingDirectory: business-interpreter
          # Pin to a v4 wrangler: the action's npx --no-install probe can't see
          # bun's node_modules, so it otherwise falls back to wrangler 3.90.0,
          # which predates wrangler.jsonc auto-discovery and drops main/assets.
          wranglerVersion: "4.95.0"
          command: deploy
      # Self-healing runtime secrets: set AFTER the Worker script exists. Each is
      # skipped when its GitHub secret is unset, so CI stays green and the app
      # degrades gracefully — AI transforms + competitor research stay dormant
      # until BI_AI_GATEWAY_API_KEY / BI_FIRECRAWL_API_KEY are added. The gateway
      # is provider-agnostic (OpenAI-compatible); BI_AI_GATEWAY_URL and
      # BI_AI_DEFAULT_MODEL are optional overrides (default: OpenRouter).
      - name: Set Worker runtime secrets
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          AI_GATEWAY_API_KEY: ${{ secrets.BI_AI_GATEWAY_API_KEY }}
          AI_GATEWAY_URL: ${{ secrets.BI_AI_GATEWAY_URL }}
          AI_DEFAULT_MODEL: ${{ secrets.BI_AI_DEFAULT_MODEL }}
          FIRECRAWL_API_KEY: ${{ secrets.BI_FIRECRAWL_API_KEY }}
          SUPABASE_URL: ${{ secrets.BI_SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.BI_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          set_secret() {
            local name="$1"; local val="$2"
            if [ -z "$val" ]; then echo "skip $name (unset)"; return 0; fi
            curl -s -X PUT \
              "https://api.cloudflare.com/client/v4/accounts/a1a1276a1a278339d95c187e0bf6de47/workers/scripts/business-interpreter-app/secrets" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"$name\",\"text\":\"$val\",\"type\":\"secret_text\"}" >/dev/null \
              && echo "set $name" || echo "failed $name"
          }
          set_secret AI_GATEWAY_API_KEY "$AI_GATEWAY_API_KEY"
          set_secret AI_GATEWAY_URL "$AI_GATEWAY_URL"
          set_secret AI_DEFAULT_MODEL "$AI_DEFAULT_MODEL"
          set_secret FIRECRAWL_API_KEY "$FIRECRAWL_API_KEY"
          set_secret SUPABASE_URL "$SUPABASE_URL"
          set_secret SUPABASE_PUBLISHABLE_KEY "$SUPABASE_PUBLISHABLE_KEY"

  deploy-signaldesk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Ensure CF Pages project exists
        run: |
          curl -s -o /dev/null \
            -X POST "https://api.cloudflare.com/client/v4/accounts/a1a1276a1a278339d95c187e0bf6de47/pages/projects" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"signaldesk-app","production_branch":"main"}' || true
      # Backend secrets — ALL optional. With none set, the access gate is closed
      # in production (APP_SHARED_SECRET empty) so every /api route returns 401 and
      # the UI renders bundled demo signals (honest "demo data" badge). CI is green
      # from the first push. Activate by adding the GitHub secrets below + creating
      # D1 (see signaldesk/README.md), then re-run. ANTHROPIC_API_KEY is the shared
      # account key; the rest are SignalDesk-scoped.
      - name: Set CF Pages environment variables
        run: |
          curl -s -X PATCH "https://api.cloudflare.com/client/v4/accounts/a1a1276a1a278339d95c187e0bf6de47/pages/projects/signaldesk-app" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "deployment_configs": {
                "production": {
                  "compatibility_flags": ["nodejs_compat"],
                  "compatibility_date": "2024-11-27",
                  "env_vars": {
                    "APP_SHARED_SECRET": {"value": "${{ secrets.SIGNALDESK_APP_SHARED_SECRET }}", "type": "secret_text"},
                    "DISCORD_BOT_TOKEN": {"value": "${{ secrets.SIGNALDESK_DISCORD_BOT_TOKEN }}", "type": "secret_text"},
                    "DISCORD_CHANNEL_ID": {"value": "${{ secrets.SIGNALDESK_DISCORD_CHANNEL_ID }}", "type": "plain_text"},
                    "ANTHROPIC_API_KEY": {"value": "${{ secrets.ANTHROPIC_API_KEY }}", "type": "secret_text"},
                    "TWELVEDATA_API_KEY": {"value": "${{ secrets.SIGNALDESK_TWELVEDATA_API_KEY }}", "type": "secret_text"},
                    "FINNHUB_API_KEY": {"value": "${{ secrets.SIGNALDESK_FINNHUB_API_KEY }}", "type": "secret_text"}
                  }
                },
                "preview": {
                  "compatibility_flags": ["nodejs_compat"],
                  "compatibility_date": "2024-11-27",
                  "env_vars": {
                    "APP_SHARED_SECRET": {"value": "${{ secrets.SIGNALDESK_APP_SHARED_SECRET }}", "type": "secret_text"},
                    "DISCORD_BOT_TOKEN": {"value": "${{ secrets.SIGNALDESK_DISCORD_BOT_TOKEN }}", "type": "secret_text"},
                    "DISCORD_CHANNEL_ID": {"value": "${{ secrets.SIGNALDESK_DISCORD_CHANNEL_ID }}", "type": "plain_text"},
                    "ANTHROPIC_API_KEY": {"value": "${{ secrets.ANTHROPIC_API_KEY }}", "type": "secret_text"},
                    "TWELVEDATA_API_KEY": {"value": "${{ secrets.SIGNALDESK_TWELVEDATA_API_KEY }}", "type": "secret_text"},
                    "FINNHUB_API_KEY": {"value": "${{ secrets.SIGNALDESK_FINNHUB_API_KEY }}", "type": "secret_text"}
                  }
                }
              }
            }' || true
      - run: cd signaldesk && bun install && bun run build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          workingDirectory: signaldesk
          command: pages deploy dist --project-name=signaldesk-app --branch=main

  # DOSE was split out to its own repo (Aaron-1411/dose, private) on 2026-06-19.
  # It now self-deploys to the dose-app Pages project from there, so the
  # deploy-dose job and the dose/ subtree were removed from the monorepo.
  # (Same pattern as the earlier cc-hub and get-settld split-outs.)
