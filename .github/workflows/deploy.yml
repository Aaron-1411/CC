name: Deploy to Cloudflare

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          command: pages deploy dashboard --project-name=aaron-projects-hub --branch=main

  deploy-get-settld:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd get-settld && bun install && bun run build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          command: pages deploy get-settld/dist --project-name=get-settld-app --branch=main

  deploy-wealth-companion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd wealth-companion && bun install && bun run build && rm -rf .wrangler
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          workingDirectory: wealth-companion/dist/server
          command: deploy

  deploy-lease-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd lease-guard && bun install && bun run build && rm -rf .wrangler
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          workingDirectory: lease-guard/dist/server
          command: deploy

  deploy-open-eyes-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd open-eyes-data && bun install && bun run build && rm -rf .wrangler
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          workingDirectory: open-eyes-data/dist/server
          command: deploy

  deploy-lifedash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          command: pages deploy lifedash --project-name=lifedash-app --branch=main

  deploy-gymseek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          workingDirectory: gymseek
          command: pages deploy . --project-name=gymseek-app --branch=main

  deploy-tastybot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd tastybot && bun install && bun run build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          command: pages deploy tastybot/dist --project-name=tastybot-app --branch=main

  # isa-investment-platform is a local-only Prisma/SQLite dev tool — API routes
  # cannot be statically exported to CF Pages. Excluded from CI until migrated
  # to a runtime that supports server-side execution (e.g. CF Workers + D1).

  deploy-digital-depth-dive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Ensure CF Pages project exists
        run: |
          curl -s -o /dev/null \
            -X POST "https://api.cloudflare.com/client/v4/accounts/a1a1276a1a278339d95c187e0bf6de47/pages/projects" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"digital-depth-dive-app","production_branch":"main"}' || true
      - run: cd digital-depth-dive && bun install && bun run build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          command: pages deploy digital-depth-dive/dist --project-name=digital-depth-dive-app --branch=main

  deploy-inkspector:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Ensure CF Pages project exists
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.cloudflare.com/client/v4/accounts/a1a1276a1a278339d95c187e0bf6de47/pages/projects" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"inkspector-app","production_branch":"main"}' || true
      - name: Set CF Pages environment variables
        run: |
          curl -s -X PATCH "https://api.cloudflare.com/client/v4/accounts/a1a1276a1a278339d95c187e0bf6de47/pages/projects/inkspector-app" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "deployment_configs": {
                "production": {
                  "compatibility_flags": ["nodejs_compat"],
                  "compatibility_date": "2024-09-23",
                  "env_vars": {
                    "NEXT_PUBLIC_SUPABASE_URL": {"value": "${{ secrets.INKSPECTOR_SUPABASE_URL }}", "type": "plain_text"},
                    "NEXT_PUBLIC_SUPABASE_ANON_KEY": {"value": "${{ secrets.INKSPECTOR_SUPABASE_ANON_KEY }}", "type": "plain_text"},
                    "SUPABASE_SERVICE_ROLE_KEY": {"value": "${{ secrets.INKSPECTOR_SUPABASE_SERVICE_ROLE_KEY }}", "type": "secret_text"},
                    "RESEND_API_KEY": {"value": "${{ secrets.RESEND_API_KEY }}", "type": "secret_text"}
                  }
                },
                "preview": {
                  "compatibility_flags": ["nodejs_compat"],
                  "compatibility_date": "2024-09-23",
                  "env_vars": {
                    "NEXT_PUBLIC_SUPABASE_URL": {"value": "${{ secrets.INKSPECTOR_SUPABASE_URL }}", "type": "plain_text"},
                    "NEXT_PUBLIC_SUPABASE_ANON_KEY": {"value": "${{ secrets.INKSPECTOR_SUPABASE_ANON_KEY }}", "type": "plain_text"},
                    "SUPABASE_SERVICE_ROLE_KEY": {"value": "${{ secrets.INKSPECTOR_SUPABASE_SERVICE_ROLE_KEY }}", "type": "secret_text"},
                    "RESEND_API_KEY": {"value": "${{ secrets.RESEND_API_KEY }}", "type": "secret_text"}
                  }
                }
              }
            }'
      - run: cd inkspector && bun install && bunx @cloudflare/next-on-pages
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.INKSPECTOR_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.INKSPECTOR_SUPABASE_ANON_KEY }}
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          wranglerVersion: '4.94.0'
          workingDirectory: inkspector
          command: pages deploy .vercel/output/static --project-name=inkspector-app --branch=main

  deploy-pension-finder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Ensure CF Pages project exists
        run: |
          curl -s -o /dev/null \
            -X POST "https://api.cloudflare.com/client/v4/accounts/a1a1276a1a278339d95c187e0bf6de47/pages/projects" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"pension-finder-app","production_branch":"main"}' || true
      - run: cd pension-finder-uk && bun install && bun run build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          command: pages deploy pension-finder-uk/out --project-name=pension-finder-app --branch=main

  deploy-brand-command-centre:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Ensure CF Pages project exists
        run: |
          curl -s -o /dev/null \
            -X POST "https://api.cloudflare.com/client/v4/accounts/a1a1276a1a278339d95c187e0bf6de47/pages/projects" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"ecommerce-deep-dive-app","production_branch":"main"}' || true
      - name: Create KV namespace (idempotent)
        id: kv
        run: |
          TITLE=brand-command-centre-data
          ACCT=a1a1276a1a278339d95c187e0bf6de47
          # Create the namespace. If it already exists CF returns an error that
          # we deliberately ignore — the id is resolved from the list below, so
          # the step is idempotent across re-runs.
          CREATE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$ACCT/storage/kv/namespaces" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"title\":\"$TITLE\"}")
          LIST=$(curl -s \
            "https://api.cloudflare.com/client/v4/accounts/$ACCT/storage/kv/namespaces?per_page=100" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}")
          # Resolve the id from the list (covers just-created and already-exists).
          # Defensive parse: result may be null/missing on an API error.
          KV_ID=$(printf '%s' "$LIST" | python3 -c "import sys,json; ns=(json.load(sys.stdin).get('result') or []); print(next((n.get('id','') for n in ns if n.get('title')=='$TITLE'),''))") || true
          if [ -z "$KV_ID" ]; then
            KV_ID=$(printf '%s' "$CREATE" | python3 -c "import sys,json; print((json.load(sys.stdin).get('result') or {}).get('id',''))") || true
          fi
          if [ -z "$KV_ID" ]; then
            echo "ERROR: could not resolve KV namespace id for $TITLE"
            echo "create response: $CREATE"
            echo "list response:   $LIST"
            exit 1
          fi
          echo "kv_id=$KV_ID" >> "$GITHUB_OUTPUT"
          echo "Resolved KV namespace $TITLE -> $KV_ID"
      - name: Set CF Pages environment variables and KV binding
        run: |
          curl -s -X PATCH "https://api.cloudflare.com/client/v4/accounts/a1a1276a1a278339d95c187e0bf6de47/pages/projects/ecommerce-deep-dive-app" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "deployment_configs": {
                "production": {
                  "compatibility_flags": ["nodejs_compat"],
                  "compatibility_date": "2024-09-23",
                  "env_vars": {
                    "ANTHROPIC_API_KEY": {"value": "${{ secrets.ANTHROPIC_API_KEY }}", "type": "secret_text"}
                  },
                  "kv_namespaces": {
                    "BCC_KV": {"namespace_id": "${{ steps.kv.outputs.kv_id }}"}
                  }
                },
                "preview": {
                  "compatibility_flags": ["nodejs_compat"],
                  "compatibility_date": "2024-09-23",
                  "env_vars": {
                    "ANTHROPIC_API_KEY": {"value": "${{ secrets.ANTHROPIC_API_KEY }}", "type": "secret_text"}
                  },
                  "kv_namespaces": {
                    "BCC_KV": {"namespace_id": "${{ steps.kv.outputs.kv_id }}"}
                  }
                }
              }
            }'
      - run: cd brand-command-centre && bun install && bunx @cloudflare/next-on-pages
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          wranglerVersion: '4.94.0'
          workingDirectory: brand-command-centre
          command: pages deploy .vercel/output/static --project-name=ecommerce-deep-dive-app --branch=main

  deploy-moneymind-uk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Ensure CF Pages project exists
        run: |
          curl -s -o /dev/null \
            -X POST "https://api.cloudflare.com/client/v4/accounts/a1a1276a1a278339d95c187e0bf6de47/pages/projects" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"moneymind-uk-app","production_branch":"main"}' || true
      - name: Set CF Pages environment variables
        run: |
          curl -s -X PATCH "https://api.cloudflare.com/client/v4/accounts/a1a1276a1a278339d95c187e0bf6de47/pages/projects/moneymind-uk-app" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "deployment_configs": {
                "production": {
                  "compatibility_flags": ["nodejs_compat"],
                  "compatibility_date": "2024-11-27",
                  "env_vars": {
                    "ANTHROPIC_API_KEY": {"value": "${{ secrets.ANTHROPIC_API_KEY }}", "type": "secret_text"}
                  }
                },
                "preview": {
                  "compatibility_flags": ["nodejs_compat"],
                  "compatibility_date": "2024-11-27",
                  "env_vars": {
                    "ANTHROPIC_API_KEY": {"value": "${{ secrets.ANTHROPIC_API_KEY }}", "type": "secret_text"}
                  }
                }
              }
            }'
      - run: cd moneymind-uk && bun install && bun run build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          workingDirectory: moneymind-uk
          command: pages deploy dist --project-name=moneymind-uk-app --branch=main

  deploy-whole-health-compass:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Ensure CF Pages project exists
        run: |
          curl -s -o /dev/null \
            -X POST "https://api.cloudflare.com/client/v4/accounts/a1a1276a1a278339d95c187e0bf6de47/pages/projects" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"whole-health-compass-app","production_branch":"main"}' || true
      # Backend secrets. The app degrades gracefully when these are unset (empty ->
      # persistence/email/admin stay dormant), so CI is green from the first push.
      # Activate by adding the GitHub secrets below, then re-run (see whole-health-compass/ACTIVATION.md).
      - name: Set CF Pages environment variables
        run: |
          curl -s -X PATCH "https://api.cloudflare.com/client/v4/accounts/a1a1276a1a278339d95c187e0bf6de47/pages/projects/whole-health-compass-app" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "deployment_configs": {
                "production": {
                  "compatibility_flags": ["nodejs_compat"],
                  "compatibility_date": "2024-11-27",
                  "env_vars": {
                    "RESEND_API_KEY": {"value": "${{ secrets.RESEND_API_KEY }}", "type": "secret_text"},
                    "LEAD_FROM": {"value": "${{ secrets.WHC_LEAD_FROM }}", "type": "plain_text"},
                    "LEAD_NOTIFY_TO": {"value": "${{ secrets.WHC_LEAD_NOTIFY_TO }}", "type": "plain_text"},
                    "ADMIN_TOKEN": {"value": "${{ secrets.WHC_ADMIN_TOKEN }}", "type": "secret_text"}
                  }
                },
                "preview": {
                  "compatibility_flags": ["nodejs_compat"],
                  "compatibility_date": "2024-11-27",
                  "env_vars": {
                    "RESEND_API_KEY": {"value": "${{ secrets.RESEND_API_KEY }}", "type": "secret_text"},
                    "LEAD_FROM": {"value": "${{ secrets.WHC_LEAD_FROM }}", "type": "plain_text"},
                    "LEAD_NOTIFY_TO": {"value": "${{ secrets.WHC_LEAD_NOTIFY_TO }}", "type": "plain_text"},
                    "ADMIN_TOKEN": {"value": "${{ secrets.WHC_ADMIN_TOKEN }}", "type": "secret_text"}
                  }
                }
              }
            }' || true
      - run: cd whole-health-compass && bun install && bun run build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          workingDirectory: whole-health-compass
          command: pages deploy dist --project-name=whole-health-compass-app --branch=main

  deploy-platespin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Ensure CF Pages project exists
        run: |
          curl -s -o /dev/null \
            -X POST "https://api.cloudflare.com/client/v4/accounts/a1a1276a1a278339d95c187e0bf6de47/pages/projects" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"platespin-app","production_branch":"main"}' || true
      - run: cd platespin && bun install && bun run build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          workingDirectory: platespin
          command: pages deploy dist --project-name=platespin-app --branch=main
