name: Deploy to Cloudflare

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          command: pages deploy dashboard --project-name=aaron-projects-hub --branch=main

  deploy-get-settld:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd get-settld && bun install && bun run build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          command: pages deploy get-settld/dist --project-name=get-settld-app --branch=main

  deploy-wealth-companion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd wealth-companion && bun install && bun run build && rm -rf .wrangler
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          workingDirectory: wealth-companion/dist/server
          command: deploy

  deploy-lease-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd lease-guard && bun install && bun run build && rm -rf .wrangler
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          workingDirectory: lease-guard/dist/server
          command: deploy

  deploy-open-eyes-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd open-eyes-data && bun install && bun run build && rm -rf .wrangler
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          workingDirectory: open-eyes-data/dist/server
          command: deploy

  deploy-lifedash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          command: pages deploy lifedash --project-name=lifedash-app --branch=main

  deploy-gymseek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          command: pages deploy gymseek --project-name=gymseek-app --branch=main

  deploy-tastybot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd tastybot && bun install && bun run build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          command: pages deploy tastybot/dist --project-name=tastybot-app --branch=main

  # isa-investment-platform is a local-only Prisma/SQLite dev tool — API routes
  # cannot be statically exported to CF Pages. Excluded from CI until migrated
  # to a runtime that supports server-side execution (e.g. CF Workers + D1).

  deploy-digital-depth-dive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Ensure CF Pages project exists
        run: |
          curl -s -o /dev/null \
            -X POST "https://api.cloudflare.com/client/v4/accounts/a1a1276a1a278339d95c187e0bf6de47/pages/projects" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"digital-depth-dive-app","production_branch":"main"}' || true
      - run: cd digital-depth-dive && bun install && bun run build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          command: pages deploy digital-depth-dive/dist --project-name=digital-depth-dive-app --branch=main

  deploy-inkspector:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Ensure CF Pages project exists
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.cloudflare.com/client/v4/accounts/a1a1276a1a278339d95c187e0bf6de47/pages/projects" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"inkspector-app","production_branch":"main"}' || true
      - name: Set CF Pages environment variables
        run: |
          curl -s -X PATCH "https://api.cloudflare.com/client/v4/accounts/a1a1276a1a278339d95c187e0bf6de47/pages/projects/inkspector-app" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "deployment_configs": {
                "production": {
                  "compatibility_flags": ["nodejs_compat"],
                  "compatibility_date": "2024-09-23",
                  "env_vars": {
                    "NEXT_PUBLIC_SUPABASE_URL": {"value": "${{ secrets.INKSPECTOR_SUPABASE_URL }}", "type": "plain_text"},
                    "NEXT_PUBLIC_SUPABASE_ANON_KEY": {"value": "${{ secrets.INKSPECTOR_SUPABASE_ANON_KEY }}", "type": "plain_text"},
                    "SUPABASE_SERVICE_ROLE_KEY": {"value": "${{ secrets.INKSPECTOR_SUPABASE_SERVICE_ROLE_KEY }}", "type": "secret_text"},
                    "RESEND_API_KEY": {"value": "${{ secrets.RESEND_API_KEY }}", "type": "secret_text"}
                  }
                },
                "preview": {
                  "compatibility_flags": ["nodejs_compat"],
                  "compatibility_date": "2024-09-23",
                  "env_vars": {
                    "NEXT_PUBLIC_SUPABASE_URL": {"value": "${{ secrets.INKSPECTOR_SUPABASE_URL }}", "type": "plain_text"},
                    "NEXT_PUBLIC_SUPABASE_ANON_KEY": {"value": "${{ secrets.INKSPECTOR_SUPABASE_ANON_KEY }}", "type": "plain_text"},
                    "SUPABASE_SERVICE_ROLE_KEY": {"value": "${{ secrets.INKSPECTOR_SUPABASE_SERVICE_ROLE_KEY }}", "type": "secret_text"},
                    "RESEND_API_KEY": {"value": "${{ secrets.RESEND_API_KEY }}", "type": "secret_text"}
                  }
                }
              }
            }'
      - run: cd inkspector && bun install && bunx @cloudflare/next-on-pages
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.INKSPECTOR_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.INKSPECTOR_SUPABASE_ANON_KEY }}
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a1a1276a1a278339d95c187e0bf6de47
          wranglerVersion: '4.94.0'
          workingDirectory: inkspector
          command: pages deploy .vercel/output/static --project-name=inkspector-app --branch=main
