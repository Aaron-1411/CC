<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0C1523"/>

  <!-- Left candle: bearish (red), small -->
  <line x1="8" y1="5" x2="8" y2="9" stroke="#F43F5E" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="5.5" y="9" width="5" height="9" rx="1" fill="#F43F5E"/>
  <line x1="8" y1="18" x2="8" y2="22" stroke="#F43F5E" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Middle candle: bullish (green), tall -->
  <line x1="16" y1="4" x2="16" y2="8" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="13.5" y="8" width="5" height="14" rx="1" fill="#10B981"/>
  <line x1="16" y1="22" x2="16" y2="27" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Right candle: bearish (red), medium -->
  <line x1="24" y1="8" x2="24" y2="12" stroke="#F43F5E" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="21.5" y="12" width="5" height="8" rx="1" fill="#F43F5E"/>
  <line x1="24" y1="20" x2="24" y2="24" stroke="#F43F5E" stroke-width="1.5" stroke-linecap="round"/>
</svg>
