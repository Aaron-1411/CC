name: Daily data snapshot

on:
  schedule:
    # 06:00 UTC daily
    - cron: "0 6 * * *"
  workflow_dispatch: # manual trigger

permissions:
  contents: write

jobs:
  fetch-snapshots:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run snapshot fetcher
        run: bun run scripts/fetch-snapshots.ts

      - name: Commit updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/snapshots/
          # Only commit if there are changes
          git diff --cached --quiet && echo "No changes" || git commit -m "chore: daily data snapshot $(date -u +%Y-%m-%d)"

      - name: Push
        run: git push
