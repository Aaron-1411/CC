<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1d4d42" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="format-detection" content="telephone=no" />

    <title>Whole Health Compass — Understand your health from every angle</title>
    <meta
      name="description"
      content="A calm, plain-English guide that helps you describe what's going on, prepares a summary for your practitioner, and explains how Western, Traditional Chinese, and Ayurvedic traditions each understand it. Educational only — always routes you to a qualified practitioner."
    />
    <meta name="robots" content="index, follow, max-image-preview:large" />

    <!-- Social / canonical defaults. These are the dev baseline and the "/" route
         fallback; scripts/prerender.mjs strips and re-injects a per-route set into
         each dist/<route>/index.html at build time. Keep in sync with that script. -->
    <link rel="canonical" href="https://whole-health-compass.pages.dev/" />

    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_GB" />
    <meta property="og:site_name" content="Whole Health Compass" />
    <meta property="og:url" content="https://whole-health-compass.pages.dev/" />
    <meta property="og:title" content="Whole Health Compass — Understand your health from every angle" />
    <meta
      property="og:description"
      content="Understand your health from every angle, then see the right practitioner. Educational guidance that always routes to a qualified human."
    />
    <meta property="og:image" content="https://whole-health-compass.pages.dev/og-image.svg" />
    <meta property="og:image:type" content="image/svg+xml" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Whole Health Compass — general education, not a medical device" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Whole Health Compass — Understand your health from every angle" />
    <meta
      name="twitter:description"
      content="Understand your health from every angle, then see the right practitioner. Educational guidance that always routes to a qualified human."
    />
    <meta name="twitter:image" content="https://whole-health-compass.pages.dev/og-image.svg" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Structured data: WebSite + Organization + WebPage. Deliberately NOT
         MedicalWebPage/MedicalOrganization — this is general education, not a
         medical entity. prerender.mjs regenerates this per route at build. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://whole-health-compass.pages.dev/#website",
          "url": "https://whole-health-compass.pages.dev/",
          "name": "Whole Health Compass",
          "description": "Understand your health from every angle, then see the right practitioner.",
          "publisher": { "@id": "https://whole-health-compass.pages.dev/#org" },
          "inLanguage": "en-GB"
        },
        {
          "@type": "Organization",
          "@id": "https://whole-health-compass.pages.dev/#org",
          "name": "Whole Health Compass",
          "url": "https://whole-health-compass.pages.dev/",
          "logo": "https://whole-health-compass.pages.dev/favicon.svg"
        },
        {
          "@type": "WebPage",
          "@id": "https://whole-health-compass.pages.dev/#webpage",
          "url": "https://whole-health-compass.pages.dev/",
          "name": "Whole Health Compass — Understand your health from every angle",
          "isPartOf": { "@id": "https://whole-health-compass.pages.dev/#website" },
          "about": { "@id": "https://whole-health-compass.pages.dev/#org" },
          "description": "A calm, plain-English guide that helps you describe what's going on, prepares a summary for your practitioner, and explains how Western, Traditional Chinese, and Ayurvedic traditions each understand it. Educational only — always routes you to a qualified practitioner.",
          "inLanguage": "en-GB"
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
