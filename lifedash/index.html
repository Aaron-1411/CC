              {viewDay.journal.eveningStruggled&&<p style={{fontSize:12,color:'#cbd5e1',lineHeight:1.7,margin:'0 0 6px'}}>⚡ {viewDay.journal.eveningStruggled}</p>}
              {viewDay.journal.eveningChange&&<p style={{fontSize:12,color:'#cbd5e1',lineHeight:1.7,margin:0}}>🔄 {viewDay.journal.eveningChange}</p>}
            </div>
          )}
          {viewDay.notes&&<div style={{padding:'12px',borderRadius:10,background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.06)'}}>
            <div style={{fontSize:10,color:'#64748b',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:6}}>📝 Notes</div>
            <p style={{fontSize:12,color:'#94a3b8',lineHeight:1.7,margin:0}}>{viewDay.notes}</p>
          </div>}
        </div>
      )}

      {/* Entry list */}
      {filtered.length===0?(
        <div className="glass rounded-2xl" style={{padding:'40px 20px',textAlign:'center'}}>
          <div style={{fontSize:40,marginBottom:12}}>📔</div>
          <div style={{fontSize:15,fontWeight:700,color:'#94a3b8',marginBottom:6}}>{search?'No results found':'No journal entries yet'}</div>
          <div style={{fontSize:12,color:'#475569'}}>{search?'Try a different search term':'Start logging today from the Log Today page'}</div>
        </div>
      ):(
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {filtered.map(([date,v])=>{
            const j=v.journal||{};

            const preview=j.eveningWentWell||j.morningIntentions||j.morningGratitude||'';
            const isViewing=viewing===date;
            return (
              <div key={date} onClick={()=>setViewing(isViewing?null:date)} className="glass-hover" style={{
                padding:'14px 16px',borderRadius:14,cursor:'pointer',
                background:isViewing?'rgba(139,92,246,0.08)':'rgba(255,255,255,0.025)',

                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:5}}>
                      <span style={{fontSize:12,fontWeight:700,color:'#94a3b8'}}>{date}</span>
                      {hasMorning&&<span style={{fontSize:10,padding:'2px 7px',borderRadius:20,background:'rgba(251,191,36,0.12)',color:'#f59e0b',border:'1px solid rgba(251,191,36,0.2)'}}>🌅 AM</span>}
                      {hasEvening&&<span style={{fontSize:10,padding:'2px 7px',borderRadius:20,background:'rgba(99,102,241,0.12)',color:'#818cf8',border:'1px solid rgba(99,102,241,0.2)'}}>🌙 PM</span>}

                    {preview&&<p style={{fontSize:12,color:'#64748b',lineHeight:1.5,margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{preview}</p>}

            );
          })}
        </div>
      )}
    </div>
  );
}

/* ─── PLAN PAGE ──────────────────────────────────────── */
function getMondayStr(dateStr) {
  const d=new Date(dateStr+'T00:00:00');
  const day=d.getDay();
  const mon=new Date(d);
  mon.setDate(d.getDate()-(day===0?6:day-1));
  return toStr(mon);
}

function PlanPage({data,setData,todayStr}) {
  const weeklyPlans=data.weeklyPlans||{};
  const weekKey=getMondayStr(todayStr);
  const plan=weeklyPlans[weekKey]||{};
  const [focus1,setFocus1]=useState(plan.focus1||'');
  const [focus2,setFocus2]=useState(plan.focus2||'');
  const [focus3,setFocus3]=useState(plan.focus3||'');
  const [intentions,setIntentions]=useState(plan.intentions||'');
  const [reflection,setReflection]=useState(plan.reflection||'');
  const [saved,setSaved]=useState(false);

  const week=getWeek(todayStr);
  const days=data.days; const goals=data.goals||[];
  const weekXP=week.reduce((s,d)=>s+dayXP(days[d],goals),0);
  const weekWork=week.filter(d=>days[d]?.workScore).map(d=>days[d].workScore);
  const avgWork=weekWork.length?(weekWork.reduce((a,b)=>a+b,0)/weekWork.length).toFixed(1):null;
  const actCount=week.reduce((s,d)=>s+(days[d]?.activities?.length||0),0);
  const journalDays=week.filter(d=>{ const j=days[d]?.journal; return j&&(j.morningIntentions||j.eveningWentWell); }).length;

  // Past weeks for review
  const pastWeeks=Array.from({length:6},(_,i)=>{
    const d=new Date(todayStr+'T00:00:00'); d.setDate(d.getDate()-7*(i+1));
    const mon=getMondayStr(toStr(d));
    const wk=getWeek(mon);
    const wXP=wk.reduce((s,d2)=>s+dayXP(days[d2],goals),0);
    const wp=weeklyPlans[mon]||{};
    return { mon, wXP, plan:wp, hasData:wXP>0||wp.focus1||wp.reflection };
  }).filter(w=>w.hasData);

  function savePlan() {
    const updated={...data,weeklyPlans:{...weeklyPlans,[weekKey]:{focus1,focus2,focus3,intentions,reflection}}};
    setData(updated); save(updated); setSaved(true); setTimeout(()=>setSaved(false),2000);
  }

  const DAYS_SHORT=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  return (
    <div className="fade-up" style={{display:'flex',flexDirection:'column',gap:14}}>
      {/* Week header */}
      <div className="glass rounded-2xl" style={{padding:'18px',borderColor:'rgba(139,92,246,0.18)',background:'rgba(139,92,246,0.05)'}}>
        <div style={{fontSize:11,fontWeight:700,color:'#7c3aed',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:10}}>Week of {weekKey}</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
          {[
            {label:'Week XP',val:weekXP,color:'#a78bfa'},
            {label:'Avg Work',val:avgWork?`${avgWork}/10`:'—',color:'#60a5fa'},
            {label:'Workouts',val:actCount,color:'#34d399'},
            {label:'Journal Days',val:journalDays,color:'#f59e0b'},
          ].map(({label,val,color})=>(
            <div key={label} style={{textAlign:'center'}}>
              <div style={{fontSize:10,color:'#475569',marginBottom:3}}>{label}</div>
              <div style={{fontSize:20,fontWeight:900,color}}>{val}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Weekly habits strip */}
      <div className="glass rounded-2xl" style={{padding:'18px'}}>
        <div style={{fontSize:11,fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:12}}>This Week's Days</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4}}>
          {week.map((d,i)=>{

/* ─── SETTINGS PAGE ──────────────────────────────────── */
function SettingsPage({data,setData,todayStr}) {
  const settings=data.settings||{};
  const [startW,setStartW]=useState(settings.startWeight??START_W);
  const [targetW,setTargetW]=useState(settings.targetWeight??TARGET_W);
  const [dailyXP,setDailyXP]=useState(settings.dailyTarget??DAILY_TARGET);
  const [saved,setSaved]=useState(false);

  function saveSettings(){
    const updated={...data,settings:{...settings,startWeight:parseFloat(startW)||START_W,targetWeight:parseFloat(targetW)||TARGET_W,dailyTarget:parseInt(dailyXP)||DAILY_TARGET}};
    setData(updated); save(updated); setSaved(true); setTimeout(()=>setSaved(false),2000);
  }

  function exportData(){
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=`life-dashboard-backup-${todayStr}.json`; a.click();
    URL.revokeObjectURL(url);
  }

  function importData(e){
    const file=e.target.files?.[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=evt=>{
      try {
        const parsed=JSON.parse(evt.target.result);
        if(parsed.days){setData(parsed);save(parsed);alert('Data imported successfully!');}
        else alert('Invalid backup file.');
      } catch { alert('Could not parse file.'); }
    };
    reader.readAsText(file);
  }

  function clearAllData(){
    if(window.confirm('This will permanently delete ALL your data. Are you sure?')){
      const fresh={days:{},goals:[],weeklyPlans:{},settings:{}};
      setData(fresh); save(fresh);

          {label:'Data Size',val:`${kb} KB`,color:'#60a5fa'},

function TasksPage({data,setData,todayStr}) {
  const tasks=data.tasks||[];

  const today_tasks=tasks.filter(t=>!t.done);
  const done_tasks=tasks.filter(t=>t.done&&t.doneDate===todayStr);

  function addTask(e){
    if(e.key==='Enter'&&input.trim()){
      const updated={...data,tasks:[...tasks,{id:genId(),text:input.trim(),createdDate:todayStr,done:false,doneDate:null}]};
      setData(updated); save(updated); setInput('');
    }
  }
  function toggleTask(id){
    const updated={...data,tasks:tasks.map(t=>t.id===id?{...t,done:!t.done,doneDate:!t.done?todayStr:null}:t)};
    setData(updated); save(updated);
  }
  function deleteTask(id){
    const updated={...data,tasks:tasks.filter(t=>t.id!==id)};
    setData(updated); save(updated);
  }
  function clearDone(){
    const updated={...data,tasks:tasks.filter(t=>!t.done)};
    setData(updated); save(updated);
  }

/* ─── INSIGHTS PAGE ──────────────────────────────────── */
function InsightsPage({data,todayStr}) {
  const days=data.days; const goals=data.goals||[];
  const allKeys=Object.keys(days).sort();

  function compare(groupA,groupB,metric,label) {
    const valA=groupA.map(k=>days[k]?.[metric]).filter(v=>v!=null);
    const valB=groupB.map(k=>days[k]?.[metric]).filter(v=>v!=null);
    if(valA.length<3||valB.length<3) return null;
    const avgA=(valA.reduce((s,v)=>s+v,0)/valA.length).toFixed(1);
    const avgB=(valB.reduce((s,v)=>s+v,0)/valB.length).toFixed(1);
    return {avgA:parseFloat(avgA),avgB:parseFloat(avgB),nA:valA.length,nB:valB.length};
  }

  // Prepare day pairs (day + next day) for "tonight→tomorrow" correlations
  const nextDayMap={};
  allKeys.forEach((k,i)=>{ if(i<allKeys.length-1){ const next=allKeys[i+1]; const diff=(new Date(next+'T00:00:00')-new Date(k+'T00:00:00'))/86400000; if(diff===1)nextDayMap[k]=next; } });

  // Cards data
  const insights=[];

  // 1. Sleep hours → next-day work score
  const sleep7plus=allKeys.filter(k=>(days[k]?.sleep?.hours||0)>=7&&nextDayMap[k]);
  const sleepUnder7=allKeys.filter(k=>days[k]?.sleep?.hours&&days[k].sleep.hours<7&&nextDayMap[k]);
  const r1=compare(sleep7plus.map(k=>nextDayMap[k]),sleepUnder7.map(k=>nextDayMap[k]),'workScore');
  if(r1) insights.push({icon:'😴',title:'Sleep ≥7h → next-day work',labelA:'7+ hours',labelB:'Under 7h',valA:r1.avgA+'/10',valB:r1.avgB+'/10',positive:r1.avgA>r1.avgB,nA:r1.nA,nB:r1.nB,delta:(r1.avgA-r1.avgB).toFixed(1),metric:'Work score'});

  // 2. Sleep quality → next-day mood
  const sleepGood=allKeys.filter(k=>(days[k]?.sleep?.quality||0)>=4&&nextDayMap[k]);
  const sleepPoor=allKeys.filter(k=>days[k]?.sleep?.quality&&days[k].sleep.quality<=2&&nextDayMap[k]);
  const r2=compare(sleepGood.map(k=>nextDayMap[k]),sleepPoor.map(k=>nextDayMap[k]),'mood');
  if(r2) insights.push({icon:'🌙',title:'Good sleep → next-day mood',labelA:'Quality 4-5',labelB:'Quality 1-2',valA:r2.avgA+'/5',valB:r2.avgB+'/5',positive:r2.avgA>r2.avgB,nA:r2.nA,nB:r2.nB,delta:(r2.avgA-r2.avgB).toFixed(1),metric:'Mood'});

  // 3. Exercise → work score
  const exDays=allKeys.filter(k=>(days[k]?.activities||[]).length>0&&days[k]?.workScore);
  const noExDays=allKeys.filter(k=>days[k]?.workScore&&!(days[k]?.activities||[]).length);
  const r3=compare(exDays,noExDays,'workScore');
  if(r3) insights.push({icon:'💪',title:'Exercise → work score',labelA:'Workout day',labelB:'Rest day',valA:r3.avgA+'/10',valB:r3.avgB+'/10',positive:r3.avgA>r3.avgB,nA:r3.nA,nB:r3.nB,delta:(r3.avgA-r3.avgB).toFixed(1),metric:'Work score'});

  // 4. Exercise → mood
  const r4=compare(exDays.filter(k=>days[k]?.mood),noExDays.filter(k=>days[k]?.mood),'mood');
  if(r4) insights.push({icon:'🏋️',title:'Exercise → mood',labelA:'Workout day',labelB:'Rest day',valA:r4.avgA+'/5',valB:r4.avgB+'/5',positive:r4.avgA>r4.avgB,nA:r4.nA,nB:r4.nB,delta:(r4.avgA-r4.avgB).toFixed(1),metric:'Mood'});

  // 5. Cut nutrition → energy
  const cutDays=allKeys.filter(k=>days[k]?.nutrition?.type==='cut'&&days[k]?.energy);
  const surplusDays=allKeys.filter(k=>days[k]?.nutrition?.type==='surplus'&&days[k]?.energy);
  const r5=compare(cutDays,surplusDays,'energy');
  if(r5) insights.push({icon:'🥗',title:'Cut vs Surplus → energy',labelA:'Cut day',labelB:'Surplus day',valA:r5.avgA+'/5',valB:r5.avgB+'/5',positive:r5.avgA>=r5.avgB,nA:r5.nA,nB:r5.nB,delta:(r5.avgA-r5.avgB).toFixed(1),metric:'Energy'});

  // 6. Journal days → mood
  const journalDays=allKeys.filter(k=>{const j=days[k]?.journal;return j&&(j.morningIntentions||j.eveningWentWell)&&days[k]?.mood;});
  const noJournalDays=allKeys.filter(k=>days[k]?.mood&&!days[k]?.journal?.morningIntentions&&!days[k]?.journal?.eveningWentWell);
  const r6=compare(journalDays,noJournalDays,'mood');
  if(r6) insights.push({icon:'📔',title:'Journalling → mood',labelA:'Journalled',labelB:'No journal',valA:r6.avgA+'/5',valB:r6.avgB+'/5',positive:r6.avgA>r6.avgB,nA:r6.nA,nB:r6.nB,delta:(r6.avgA-r6.avgB).toFixed(1),metric:'Mood'});

  // 7. Weekend vs weekday work score
  const weekdayWork=allKeys.filter(k=>{ const d=new Date(k+'T00:00:00').getDay(); return d>=1&&d<=5&&days[k]?.workScore; });
  const weekendWork=allKeys.filter(k=>{ const d=new Date(k+'T00:00:00').getDay(); return (d===0||d===6)&&days[k]?.workScore; });
  const r7=compare(weekdayWork,weekendWork,'workScore');
  if(r7) insights.push({icon:'📅',title:'Weekday vs Weekend work',labelA:'Weekday',labelB:'Weekend',valA:r7.avgA+'/10',valB:r7.avgB+'/10',positive:r7.avgA>r7.avgB,nA:r7.nA,nB:r7.nB,delta:(r7.avgA-r7.avgB).toFixed(1),metric:'Work score'});

  // 8. Streak momentum: this week vs last week XP
  const thisWeek=getWeek(todayStr);
  const lastWeekStart=new Date(thisWeek[0]+'T00:00:00'); lastWeekStart.setDate(lastWeekStart.getDate()-7);
  const lastWeek=getWeek(toStr(lastWeekStart));
  const thisWXP=thisWeek.reduce((s,k)=>s+dayXP(days[k],goals),0);
  const lastWXP=lastWeek.reduce((s,k)=>s+dayXP(days[k],goals),0);
  const momentum=thisWXP-lastWXP;

  return (
    <div className="fade-up" style={{display:'flex',flexDirection:'column',gap:14}}>
      {/* Header */}
      <div className="glass rounded-2xl" style={{padding:'16px 18px',borderColor:'rgba(99,102,241,0.2)',background:'rgba(99,102,241,0.05)'}}>
        <div style={{fontSize:11,fontWeight:700,color:'#6366f1',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:4}}>Auto-detected Patterns</div>
        <div style={{fontSize:13,color:'#94a3b8'}}>Based on your logged data — minimum 3 data points per insight</div>
      </div>

      {/* Momentum */}
      <div className="glass rounded-2xl" style={{padding:'16px 18px',borderColor:`${momentum>=0?'rgba(52,211,153,0.2)':'rgba(239,68,68,0.2)'}`,background:`${momentum>=0?'rgba(52,211,153,0.04)':'rgba(239,68,68,0.04)'}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:4}}>📈 Week Momentum</div>
            <div style={{fontSize:13,color:'#94a3b8'}}>This week vs last week</div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:28,fontWeight:900,color:momentum>=0?'#34d399':'#f87171'}}>{momentum>=0?'+':''}{momentum} XP</div>
            <div style={{fontSize:11,color:'#475569'}}>{thisWXP} vs {lastWXP}</div>
          </div>
        </div>
      </div>

      {/* Correlation cards */}
      {insights.length===0?(
        <div className="glass rounded-2xl" style={{padding:'40px 20px',textAlign:'center'}}>
          <div style={{fontSize:40,marginBottom:12}}>🔍</div>
          <div style={{fontSize:15,fontWeight:700,color:'#94a3b8',marginBottom:6}}>Not enough data yet</div>
          <div style={{fontSize:12,color:'#475569'}}>Keep logging daily — insights appear once you have enough entries to compare</div>
        </div>
      ):(
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {insights.map((ins,i)=>(
            <div key={i} className="glass rounded-2xl" style={{padding:'16px 18px'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:20}}>{ins.icon}</span>
                  <div>
                    <div style={{fontSize:13,fontWeight:700,color:'#f1f5f9'}}>{ins.title}</div>
                    <div style={{fontSize:10,color:'#475569',marginTop:2}}>{ins.metric} · {ins.nA}+{ins.nB} data points</div>
                  </div>
                </div>
                <div style={{
                  padding:'4px 10px',borderRadius:20,fontSize:12,fontWeight:800,
                  background:ins.positive?'rgba(52,211,153,0.15)':'rgba(239,68,68,0.15)',
                  color:ins.positive?'#34d399':'#f87171',
                  border:`1px solid ${ins.positive?'rgba(52,211,153,0.3)':'rgba(239,68,68,0.3)'}`
                }}>{ins.positive?'+':''}{ins.delta}</div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                {[{label:ins.labelA,val:ins.valA,highlight:ins.positive},{label:ins.labelB,val:ins.valB,highlight:!ins.positive}].map(({label,val,highlight})=>(
                  <div key={label} style={{
                    padding:'10px 12px',borderRadius:10,textAlign:'center',
                    background:highlight?'rgba(139,92,246,0.08)':'rgba(255,255,255,0.02)',
                    border:`1px solid ${highlight?'rgba(139,92,246,0.2)':'rgba(255,255,255,0.05)'}`
                  }}>
                    <div style={{fontSize:10,color:'#64748b',marginBottom:4}}>{label}</div>
                    <div style={{fontSize:20,fontWeight:900,color:highlight?'#a78bfa':'#64748b'}}>{val}</div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ─── ACHIEVEMENTS PAGE ──────────────────────────────── */
function AchievementsPage({data,todayStr}) {
  const goals=data.goals||[];
  const achievements=calcAchievements(data,goals,todayStr);
  const unlocked=achievements.filter(a=>a.unlocked);
  const totalXP=Object.values(data.days).reduce((s,d)=>s+dayXP(d,goals),0);
  const lv=calcLevel(totalXP);

  return (
    <div className="fade-up" style={{display:'flex',flexDirection:'column',gap:14}}>
      {/* Level header */}
      <div className="glass rounded-2xl" style={{padding:'20px',background:'rgba(245,158,11,0.05)',borderColor:'rgba(245,158,11,0.2)'}}>
        <div style={{display:'flex',alignItems:'center',gap:16}}>
          <div style={{fontSize:44,lineHeight:1}}>{lv.icon}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:10,color:'#92400e',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:2}}>Level {lv.level}</div>
            <div style={{fontSize:24,fontWeight:900,color:'#fcd34d',lineHeight:1,marginBottom:8}}>{lv.title}</div>
            <div style={{height:6,background:'rgba(255,255,255,0.07)',borderRadius:3,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${lv.pct*100}%`,background:'linear-gradient(90deg,#f59e0b,#fcd34d)',borderRadius:3,transition:'width 0.5s'}}/>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',marginTop:5}}>
              <span style={{fontSize:10,color:'#78350f'}}>{lv.xpInto.toLocaleString()} XP into level</span>
              <span style={{fontSize:10,color:'#78350f'}}>{lv.xpRange===Infinity?'MAX':((lv.xpRange-lv.xpInto).toLocaleString()+' to Level '+(lv.level+1))}</span>
            </div>
          </div>
        </div>
        <div style={{marginTop:12,padding:'10px 14px',borderRadius:10,background:'rgba(245,158,11,0.08)',border:'1px solid rgba(245,158,11,0.15)',display:'flex',justifyContent:'space-between'}}>
          <span style={{fontSize:12,color:'#f59e0b'}}>🏆 Total XP</span>
          <span style={{fontSize:14,fontWeight:900,color:'#fcd34d'}}>{totalXP.toLocaleString()}</span>
        </div>
      </div>

      {/* Progress */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <div className="glass rounded-2xl" style={{padding:'14px',textAlign:'center'}}>
          <div style={{fontSize:10,color:'#64748b',textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:6}}>Unlocked</div>
          <div style={{fontSize:28,fontWeight:900,color:'#34d399'}}>{unlocked.length}<span style={{fontSize:14,color:'#475569',fontWeight:400}}>/{achievements.length}</span></div>
        </div>
        <div className="glass rounded-2xl" style={{padding:'14px',textAlign:'center'}}>
          <div style={{fontSize:10,color:'#64748b',textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:6}}>Completion</div>
          <div style={{fontSize:28,fontWeight:900,color:'#a78bfa'}}>{Math.round(unlocked.length/achievements.length*100)}%</div>
        </div>
      </div>

      {/* Badge grid */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:10}}>
        {achievements.map(a=>(
          <div key={a.id} style={{
            padding:'16px',borderRadius:16,
            background:a.unlocked?'rgba(52,211,153,0.06)':'rgba(255,255,255,0.02)',
            border:`1px solid ${a.unlocked?'rgba(52,211,153,0.25)':'rgba(255,255,255,0.05)'}`,
            opacity:a.unlocked?1:0.55,transition:'all 0.2s'
          }}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
              <div style={{
                width:42,height:42,borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:22,flexShrink:0,
                background:a.unlocked?'rgba(52,211,153,0.15)':'rgba(255,255,255,0.04)',
                border:`1px solid ${a.unlocked?'rgba(52,211,153,0.3)':'rgba(255,255,255,0.07)'}`,
                filter:a.unlocked?'none':'grayscale(1)'
              }}>{a.icon}</div>
              <div>
                <div style={{fontSize:12,fontWeight:700,color:a.unlocked?'#f1f5f9':'#475569'}}>{a.name}</div>
                {a.unlocked&&<div style={{fontSize:10,color:'#34d399',marginTop:1}}>✓ Unlocked</div>}
                {!a.unlocked&&<div style={{fontSize:10,color:'#334155',marginTop:1}}>Locked</div>}
              </div>
            </div>
            <div style={{fontSize:11,color:'#475569',lineHeight:1.4}}>{a.desc}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─── NAV CONFIG ─────────────────────────────────────── */
const NAV=[
  {id:'overview',      label:'Overview',     icon:'◎'},
  {id:'today',         label:'Log Today',    icon:'✏️'},
  {id:'tasks',         label:'Tasks',        icon:'📋'},
  {id:'journal',       label:'Journal',      icon:'📔'},
  {id:'plan',          label:'Weekly Plan',  icon:'🗓️'},
  {id:'insights',      label:'Insights',     icon:'💡'},
  {id:'achievements',  label:'Achievements', icon:'🏅'},
  {id:'fitness',       label:'Fitness',      icon:'💪'},
  {id:'nutrition',     label:'Nutrition',    icon:'🥗'},
  {id:'work',          label:'Work',         icon:'💼'},
  {id:'weight',        label:'Weight',       icon:'⚖️'},
  {id:'calendar',      label:'Calendar',     icon:'📅'},
  {id:'goals',         label:'Goals',        icon:'🎯'},
  {id:'settings',      label:'Settings',     icon:'⚙️'},
];

/* ─── APP ────────────────────────────────────────────── */
function App() {
  const [page,setPage]=useState('overview');
  const [data,setData]=useState(()=>{
    const loaded=ensureGoals(loadData());
    const seeded=seedIfEmpty(loaded);
    if(Object.keys(seeded.days).length>Object.keys(loaded.days).length) save(seeded);
    return seeded;
  });
  const [menuOpen,setMenuOpen]=useState(false);
  const todayStr=today();

  // Settings-derived globals (override hardcoded constants)
  const S_START_W  = data.settings?.startWeight  ?? START_W;
  const S_TARGET_W = data.settings?.targetWeight ?? TARGET_W;
  const S_DAILY    = data.settings?.dailyTarget  ?? DAILY_TARGET;

  const goals=data.goals||[];
  const tXP=dayXP(data.days[todayStr],goals);
  const streak=calcStreak(data.days,todayStr,goals);

  const pages={overview:Overview,today:LogToday,tasks:TasksPage,journal:JournalPage,plan:PlanPage,insights:InsightsPage,achievements:AchievementsPage,fitness:Fitness,nutrition:Nutrition,work:Work,weight:WeightPage,calendar:CalendarPage,goals:Goals,settings:SettingsPage};
  const PageComp=pages[page];

  function navTo(id){ setPage(id); setMenuOpen(false); }

  return (
    <div style={{display:'flex',minHeight:'100vh',background:'#07070f'}}>

      {/* Desktop sidebar */}
      <div className="sidebar" style={{
        width:210,flexShrink:0,position:'fixed',left:0,top:0,bottom:0,
        background:'rgba(255,255,255,0.018)',borderRight:'1px solid rgba(255,255,255,0.055)',
        display:'none',flexDirection:'column',zIndex:50,overflowY:'auto'
      }}>
        {/* Brand */}
        <div style={{padding:'22px 16px 14px',borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
          <div style={{fontSize:15,fontWeight:900,background:'linear-gradient(135deg,#c4b5fd,#60a5fa)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',letterSpacing:'-0.01em'}}>
            Life Dashboard
          </div>
          <div style={{fontSize:10,color:'#334155',marginTop:3}}>{todayStr}</div>
        </div>

        {/* Mini XP */}
        <div style={{padding:'12px 16px',borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
            <span style={{fontSize:10,color:'#475569',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em'}}>Today</span>
            <span style={{fontSize:10,color:'#f97316'}}>🔥 {streak}d</span>
          </div>
          <div style={{height:5,background:'rgba(255,255,255,0.05)',borderRadius:3,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${Math.min(tXP/S_DAILY*100,100)}%`,background:'linear-gradient(90deg,#6d28d9,#a855f7)',borderRadius:3,transition:'width 0.4s'}}/>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:5}}>
            <span style={{fontSize:11,color:'#8b5cf6',fontWeight:700}}>{tXP} XP</span>
            <span style={{fontSize:10,color:'#334155'}}>{Math.max(S_DAILY-tXP,0)} left</span>
          </div>
        </div>

        {/* Nav */}
        <nav style={{flex:1,padding:'10px 10px'}}>
          {NAV.map(item=>(
            <button key={item.id} onClick={()=>navTo(item.id)}
              className={`nav-btn w-full text-left rounded-xl ${page===item.id?'active':''}`}
              style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',
                marginBottom:3,color:page===item.id?'#c4b5fd':'#64748b',fontWeight:500,fontSize:12,
                width:'100%',textAlign:'left'}}>
              <span style={{fontSize:17}}>{item.icon}</span>{item.label}
            </button>
          ))}
        </nav>

        {/* Level display */}
        {(()=>{
          const totalXP=Object.values(data.days).reduce((s,d)=>s+dayXP(d,goals),0);
          const lv=calcLevel(totalXP);
          return (
            <div style={{padding:'12px 16px',borderTop:'1px solid rgba(255,255,255,0.05)'}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                <span style={{fontSize:16}}>{lv.icon}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:11,fontWeight:800,color:'#fcd34d',letterSpacing:'0.02em'}}>Lv.{lv.level} {lv.title}</div>
                  <div style={{fontSize:9,color:'#78350f'}}>{totalXP.toLocaleString()} total XP</div>
                </div>
              </div>
              <div style={{height:3,background:'rgba(255,255,255,0.05)',borderRadius:2,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${lv.pct*100}%`,background:'linear-gradient(90deg,#f59e0b,#fcd34d)',borderRadius:2}}/>
              </div>
              <div style={{fontSize:8,color:'#78350f',marginTop:3,textAlign:'right'}}>
                {lv.xpRange===Infinity?'MAX LEVEL':`${(lv.xpRange-lv.xpInto).toLocaleString()} XP to Lv.${lv.level+1}`}
              </div>
            </div>
          );
        })()}
      </div>

      {/* Mobile top bar */}
      <div className="mobile-bar" style={{
        position:'fixed',top:0,left:0,right:0,zIndex:60,
        background:'rgba(7,7,15,0.95)',borderBottom:'1px solid rgba(255,255,255,0.06)',
        padding:'11px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',
        backdropFilter:'blur(12px)'
      }}>
        <div style={{fontSize:14,fontWeight:900,background:'linear-gradient(135deg,#c4b5fd,#60a5fa)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>
          Life Dashboard
        </div>
        <div style={{display:'flex',gap:14,alignItems:'center'}}>
          <span style={{fontSize:11,color:'#8b5cf6',fontWeight:700}}>{tXP} XP</span>
          <span style={{fontSize:11,color:'#f97316'}}>🔥 {streak}</span>
          <button onClick={()=>setMenuOpen(!menuOpen)} style={{background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:8,padding:'5px 10px',color:'#94a3b8',cursor:'pointer',fontSize:14}}>
            {menuOpen?'✕':'☰'}
          </button>
        </div>
      </div>

      {/* Mobile dropdown menu */}
      {menuOpen&&(
        <div style={{
          position:'fixed',top:50,left:0,right:0,zIndex:59,
          background:'rgba(7,7,15,0.98)',borderBottom:'1px solid rgba(255,255,255,0.07)',
          padding:'8px 10px',backdropFilter:'blur(12px)'
        }}>
          {NAV.map(item=>(
            <button key={item.id} onClick={()=>navTo(item.id)} style={{
              display:'flex',alignItems:'center',gap:12,padding:'12px 14px',width:'100%',
              borderRadius:10,border:'1px solid transparent',cursor:'pointer',
              background:page===item.id?'rgba(139,92,246,0.12)':'transparent',
              color:page===item.id?'#c4b5fd':'#64748b',fontWeight:page===item.id?600:400,fontSize:13,marginBottom:2
            }}>
              <span style={{fontSize:18}}>{item.icon}</span>{item.label}
            </button>
          ))}
        </div>
      )}

      {/* Main */}
      <div className="main-pad" style={{flex:1,padding:'24px 0',marginLeft:0}}>
        <div style={{maxWidth:680,margin:'0 auto',padding:'0 16px'}}>
          {/* Page header */}
          <div style={{marginBottom:20,display:'flex',alignItems:'center',gap:12}}>
            <h1 style={{fontSize:20,fontWeight:900,color:'#f1f5f9'}}>
              {NAV.find(n=>n.id===page)?.icon}&nbsp;{NAV.find(n=>n.id===page)?.label}
            </h1>
          </div>

          {/* Page component */}
          <PageComp data={data} setData={setData} todayStr={todayStr} startW={S_START_W} targetW={S_TARGET_W} dailyTarget={S_DAILY}/>

          <div style={{height:40}}/>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
