name = "isa-platform"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[rules]]
globs = ["**/*.wasm"]
type = "CompiledWasm"
fallthrough = true

[vars]
NODE_ENV = "production"
NEXT_PUBLIC_REFRESH_INTERVAL = "30000"
